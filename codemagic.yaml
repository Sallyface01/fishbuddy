workflows:
  fishbuddy-android:
    name: FishBuddy Android Build
    max_build_duration: 60
    environment:
      java: 17
      android_sdk: 35
    scripts:
      - name: Fix Gradle Wrapper
        script: |
          # Ensure exec permission
          chmod +x gradlew

          # Regenerate wrapper files from scratch — repo copy is likely corrupted by Git CRLF
          echo ">> Regenerating Gradle wrapper with system Gradle..."
          gradle wrapper --gradle-version 8.9

          # Write properties with HTTPS URL (CI can't access local files)
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          echo ">> Wrapper regenerated OK"
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
